<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CrimeGPT</title>
  <script>
    // GitHub Pages SPA fallback:
    // Converts /cases → /?/cases then redirects to / so React Router
    // can read the original path from the query string.
    var pathSegmentsToKeep = 1; // adjust if using /repo-name/ subpath
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
